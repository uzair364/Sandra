<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPrint - Professional Xerox & Printing Services</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #0056b3; /* Xerox Blue style */
            --secondary-color: #f4f4f4;
            --accent-color: #ff9900;
            --text-dark: #333;
            --text-light: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--text-dark);
        }

        /* Navigation */
        nav {
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .cta-btn {
            background: var(--primary-color);
            color: white !important;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .cta-btn:hover {
            background: #004494;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1562564055-71e051d33c19?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .hero-btn {
            background: var(--accent-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .hero-btn:hover {
            background: #e68a00;
        }

        /* Services Section */
        .services {
            padding: 4rem 5%;
            background: white;
            text-align: center;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .section-subtitle {
            margin-bottom: 40px;
            color: #666;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--secondary-color);
            padding: 30px;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        /* Pricing / Info Banner */
        .info-banner {
            background: var(--primary-color);
            color: white;
            padding: 3rem 5%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            text-align: center;
        }

        .info-item {
            margin: 15px;
        }

        .info-item h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        /* Contact Section */
        .contact {
            padding: 4rem 5%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            background: #f9f9f9;
        }

        .contact-info, .contact-form {
            flex: 1;
            min-width: 300px;
        }

        .contact-info h3 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .contact-details p {
            margin-bottom: 15px;
        }

        .map-placeholder {
            width: 100%;
            height: 250px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            border-radius: 5px;
            color: #555;
        }

        form input, form textarea, form select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
